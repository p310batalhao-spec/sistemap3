<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Ocorrências</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/stylecadastroocorrencia.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<body>
    <header>
        <div class="header-info-left">
            <img class="brasao" src="../img/brasao.png" alt="brasão do 10º Batalhão">
            <div class="cabecalhotexto">
                <h1>SISTEMA DE GERENCIAMENTO P3</h1>
                <h3>10º BATALHÃO DE POLÍCIA MILITAR</h3>
            </div>
        </div>

        <div class="header-info-right">
            <div class="relogio" id="relogio"></div>
            <div class="exibirusuario" id="user-info"></div>
        </div>
    </header>

    <section class="pagecomplete">
        <nav class="navegacao">
            <a href="../index.html">
                <img width="48" height="48" src="https://img.icons8.com/fluency-systems-regular/48/home--v1.png"
                    alt="home--v1" />
                <p>Home</p>
            </a><!--termina home-->
            <a href="../page/dashboard.html">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/performance-macbook.png"
                    alt="performance-macbook" />
                <p>Dashboard</p>
            </a><!--termina dashboard-->
            <a href="../page/cadastroocorrencias.html"  class="active">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/add-file.png" alt="add-file" />
                <p>Cadastro de Ocorrências</p>
            </a><!--termina cadastroocorrencias-->
            <a href="../page/materiais.html">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/box--v1.png" alt="box--v1" />
                <p>Materiais Apreendidos</p>
            </a><!--termina materiais apreendidos-->
            <a href="../page/eventos.html">
                <img width="32" height="32"
                    src="https://img.icons8.com/external-outlines-amoghdesign/32/external-dance-happy-new-year-outlines-amoghdesign.png"
                    alt="external-dance-happy-new-year-outlines-amoghdesign" />
                <p>Eventos</p>
            </a><!--termina eventos-->
            <a href="../page/solucoesia.html">
                <img width="48" height="48" src="https://img.icons8.com/sf-regular/48/bot.png" alt="bot" />
                <p>Soluções IA</p>
            </a><!--termina solucoes ia-->
            <button id="btn-logout" class="btn-logout">
                <img width="48" height="48" src="https://img.icons8.com/material-outlined/48/exit.png" alt="Sair" />
                <p>Sair</p>
            </button><!--termina sair-->
        </nav><!--termina navegacao-->
        <main>
            <div class="ConteudoCadastro">
                <section class="import-section" style="padding: 20px; background: #fff; border-radius: 8px;">
                    <h3>Gestão e Importação de Dados</h3>
                    <p style="margin-bottom: 20px;">Selecione o tipo de relatório oficial para atualizar o banco de dados.</p>
                    
                    <select id="tipo-colecao" class="select-p3" style="width: 100%; max-width: 400px; padding: 12px; margin-bottom: 20px;">
                        <option value="">-- Selecione o Tipo de Arquivo --</option>
                        <option value="geral">Geral (Cruzamento Automático)</option>
                        <option value="arma">Relatório de Armas</option>
                        <option value="droga">Relatório de Drogas</option>
                        <option value="veiculo">Relatório de Veículos</option>
                        <option value="objeto">Relatório de Objetos</option>
                        <option value="autor">Relatório de Autores</option>
                    </select>
                    
                    <div class="upload-box" id="drop-zone" style="border: 2px dashed #1a237e; padding: 40px; text-align: center; position: relative; background: #f8f9ff;">
                        <input type="file" id="input-xls" accept=".xls, .xlsx" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: #1a237e;"></i>
                        <p id="status-msg">Arraste a planilha ou clique para selecionar</p>
                    </div>

                    <button id="btn-save-cloud" class="btn-primary" style="display:none; margin-top: 20px; background: #2e7d32; color: white; padding: 15px 30px; border: none; border-radius: 4px; cursor: pointer;">
                        <i class="fas fa-sync"></i> PROCESSAR E SALVAR NO FIREBASE
                    </button>
                </section>
            </div>
        </main>
    </section>

    <script src="../js/cadastroocorrencias.js"></script>
</body>
</html>
