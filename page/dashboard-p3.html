<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard P3 — 10º BPM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
        /* ── Reset / Base ─────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: Arial, sans-serif; background: #f0f2f8; }

        main {
            flex: 1;
            padding: 1.1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        /* ── Cabeçalho do dash ────────────────────────────── */
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .75rem;
            background: linear-gradient(90deg, #0a448f 0%, #1464b5 60%, #3b6fb8 100%);
            border-radius: 10px;
            padding: 1rem 1.5rem;
            color: #fff;
        }
        .dash-header h2 { font-size: 1.05rem; font-weight: bold; }
        .dash-header small { font-size: .75rem; opacity: .7; display: block; margin-top: .15rem; }
        .dash-header .relogio-dash { font-size: .82rem; opacity: .8; text-align: right; }

        /* ── Filtro período ───────────────────────────────── */
        .periodo-bar {
            display: flex;
            align-items: center;
            gap: .75rem;
            flex-wrap: wrap;
            background: #fff;
            border: 1.5px solid #d0d5e8;
            border-radius: 8px;
            padding: .65rem 1rem;
        }
        .periodo-bar label { font-size: .82rem; font-weight: bold; color: #374263; }
        .periodo-bar input[type=date] {
            padding: 6px 10px;
            border: 1.5px solid #d0d5e8;
            border-radius: 6px;
            font-size: .83rem;
        }
        .periodo-bar button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: .82rem;
            font-weight: bold;
        }
        .btn-limpar { background: #e8ecf5; color: #374263; }
        #badge-periodo {
            font-size: .75rem;
            background: #1a237e;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            display: none;
        }

        /* ── KPIs ─────────────────────────────────────────── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: .85rem;
        }
        .kpi-card {
            background: #fff;
            border-radius: 10px;
            padding: 1rem 1.1rem;
            border-top: 4px solid #3b6fb8;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            display: flex;
            flex-direction: column;
            gap: .25rem;
        }
        .kpi-card.cvli  { border-top-color: #6a1b9a; }
        .kpi-card.cvp   { border-top-color: #e65100; }
        .kpi-card.mvi   { border-top-color: #b71c1c; }
        .kpi-card.vd    { border-top-color: #ad1457; }
        .kpi-card.tco   { border-top-color: #1565c0; }
        .kpi-card.arma  { border-top-color: #2e7d32; }
        .kpi-card.drug  { border-top-color: #f57f17; }
        .kpi-card.sos   { border-top-color: #00695c; }

        .kpi-label { font-size: .72rem; font-weight: bold; color: #6b7594; text-transform: uppercase; letter-spacing: .05em; }
        .kpi-valor { font-size: 2rem; font-weight: bold; color: #1a1f36; line-height: 1.1; }
        .kpi-sub   { font-size: .72rem; color: #9ea3b5; }

        /* ── Grid de gráficos ─────────────────────────────── */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .chart-card {
            background: #fff;
            border-radius: 10px;
            padding: 1.1rem 1.2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
        }
        .chart-card.full { grid-column: 1 / -1; }
        .chart-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: .85rem;
            gap: .5rem;
            flex-wrap: wrap;
        }
        .chart-title  { font-size: .85rem; font-weight: bold; color: #1a1f36; }
        .chart-sub    { font-size: .72rem; color: #9ea3b5; margin-top: .1rem; }
        .chart-filter select, .chart-filter input {
            padding: 5px 9px;
            border: 1.5px solid #d0d5e8;
            border-radius: 6px;
            font-size: .8rem;
            background: #fafbff;
        }
        .chart-wrap { position: relative; height: 240px; }
        .chart-wrap.tall { height: 300px; }

        /* ── Tabela de cruzamento ─────────────────────────── */
        .scroll-tabela { overflow-x: auto; }
        .cruzamento-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem;
        }
        .cruzamento-table th {
            background: #f0f2f8;
            color: #374263;
            font-weight: bold;
            padding: 8px 10px;
            text-align: left;
            white-space: nowrap;
            border-bottom: 2px solid #d0d5e8;
        }
        .cruzamento-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #edf0f8;
            vertical-align: middle;
        }
        .cruzamento-table tr:hover td { background: #f8f9ff; }

        .badge-tip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .7rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .tip-cvli { background: #ede7f6; color: #4a148c; }
        .tip-cvp  { background: #fff3e0; color: #e65100; }
        .tip-mvi  { background: #ffebee; color: #b71c1c; }
        .tip-out  { background: #f0f2f8; color: #374263; }
        .obito-s  { background: #c62828; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: .7rem; font-weight: bold; }
        .obito-n  { background: #e0e0e0; color: #555; padding: 2px 8px; border-radius: 4px; font-size: .7rem; }

        /* ── Loader ───────────────────────────────────────── */
        .loader-dash {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .75rem;
            padding: 3rem;
            font-size: .9rem;
            color: #6b7594;
        }

        /* ── Heatmap horário ──────────────────────────────── */
        .hora-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4px;
            margin-top: .5rem;
        }
        .hora-cel {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            font-weight: bold;
            cursor: default;
        }

        /* ── Seção título ─────────────────────────────────── */
        .secao-titulo {
            font-size: .82rem;
            font-weight: bold;
            color: #374263;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: .4rem 0 .1rem;
            border-bottom: 2px solid #e8ecf5;
        }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-info-left">
            <img class="brasao" src="../img/brasao.png" alt="brasão do 10º Batalhão">
            <div class="cabecalhotexto">
                <h1>SISTEMA DE GERENCIAMENTO P3</h1>
                <h3>10º BATALHÃO DE POLÍCIA MILITAR</h3>
            </div>
        </div>
        <div class="header-info-right">
            <div class="relogio" id="relogio"></div>
            <div class="exibirusuario" id="user-info"></div>
        </div>
    </header>

    <section class="pagecomplete">
        <nav class="navegacao">
            <a href="../index.html">
                <img width="48" height="48" src="https://img.icons8.com/fluency-systems-regular/48/home--v1.png" alt="home"/>
                <p>Home</p>
            </a>
            <a href="../page/dashboard-p3.html" class="active">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/performance-macbook.png" alt="dashboard"/>
                <p>Dashboard</p>
            </a>
            <a href="../page/cadastroocorrencias.html">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/add-file.png" alt="ocorrências"/>
                <p>Cadastro de Ocorrências</p>
            </a>
            <a href="../page/materiais.html">
                <img width="50" height="50" src="https://img.icons8.com/ios/50/box--v1.png" alt="materiais"/>
                <p>Materiais Apreendidos</p>
            </a>
            <a href="../page/solucoesia.html">
                <img width="48" height="48" src="https://img.icons8.com/sf-regular/48/bot.png" alt="IA"/>
                <p>Soluções IA</p>
            </a>
            <button id="btn-logout" class="btn-logout">
                <img width="48" height="48" src="https://img.icons8.com/material-outlined/48/exit.png" alt="Sair"/>
                <p>Sair</p>
            </button>
        </nav>

        <main id="dash-main">
            <div class="loader-dash" id="loader">
                <i class="fas fa-spinner fa-spin" style="font-size:1.4rem;color:#1a237e;"></i>
                Carregando dados do Firebase…
            </div>
        </main>
    </section>

    <footer>
        <div><h4>Seção de Planejamento, Instrução e Estatística - P3/10ºBPM</h4></div>
    </footer>

    <script src="../js/dashboard-p3.js"></script>
</body>
</html>
