<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Drogas - P3</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header h2 { margin: 0; }
        .footer { border-top: 1px solid #333; margin-top: 20px; padding-top: 10px; font-size: 15px; text-align: center; }
        @media print {
            .no-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>10º BATALHÃO DE POLÍCIA MILITAR</h2>
        <h3>Relatório de Drogas Apreendidas</h3>
        <p id="info-relatorio" style="font-size:13px; margin-top:8px; color:#555;"></p>
    </div>

    <div id="tabela-destino"></div>

    <div class="footer">
        <h4>Seção de Planejamento, Instrução e Estatística - P3/10ºBPM</h4>
    </div>

    <script>
        window.onload = function() {
            // Usuário logado e data/hora de confecção
            const grad = localStorage.getItem('userGraduacao') || '';
            const nome = localStorage.getItem('userNomeGuerra') || '';
            const usuario = (grad + ' ' + nome).trim() || 'Não identificado';
            const agora = new Date();
            const dataHora = agora.toLocaleDateString('pt-BR') + ' às ' +
                agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const elInfo = document.getElementById('info-relatorio');
            if (elInfo) elInfo.innerHTML =
                `Confeccionado por: <strong>${usuario}</strong> &nbsp;|&nbsp; Data/Hora: <strong>${dataHora}</strong>`;

            const dadosRaw = localStorage.getItem('dadosRelatorioDrogas');
            if (dadosRaw) {
                const dados = JSON.parse(dadosRaw);
                let html = '<table><thead><tr>' +
                    '<th>DATA</th><th>COP</th><th>NOME</th><th>CIDADE</th><th>TIPO</th><th>PESO (g)</th><th>ESAJ</th><th>STATUS (ESAJ)</th>' +
                    '</tr></thead><tbody>';
                
                dados.forEach(item => {
                    html += `<tr>
                        <td>${item['DATA'] || ''}</td>
                        <td>${item.BOLETIM|| ''}</td>
                        <td>${item.AUTOR|| ''}</td>
                        <td>${item['CIDADE'] || ''}</td>
                        <td>${item.TIPO_DROGA || ''}</td>
                        <td>${item.QUANTIDADE || ''}</td>
                        <td>${item['E-SAJ'] || ''}</td>
                        <td>${item['Movimentação'] || ''}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                document.getElementById('tabela-destino').innerHTML = html;
            } else {
                document.body.innerHTML = "<h3>Nenhum dado encontrado para gerar o relatório.</h3>";
            }
        };
    </script>
</body>
</html>
